name: Build & Test Sober Lock APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.4"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Unit Tests
        run: ./gradlew test --no-daemon

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon
        env:
          ADMOB_APP_ID: ${{ secrets.ADMOB_APP_ID }}

      - name: Build Debug APK (for emulator testing)
        run: ./gradlew assembleDebug --no-daemon

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "33.0.1"

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: sober-lock-release
          path: app/build/outputs/apk/release/*.apk

      - name: Enable KVM for emulator
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Android Emulator Tests & Screenshots
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86_64
          profile: Nexus 6
          script: |
            # Wait for emulator to fully boot
            adb wait-for-device
            adb shell input keyevent 82

            # Install the debug APK
            adb install app/build/outputs/apk/debug/app-debug.apk

            # Launch the app
            adb shell monkey -p com.ap711.soberlock -c android.intent.category.LAUNCHER 1
            sleep 5

            # Take screenshot of home screen
            adb shell screencap -p /sdcard/screenshot_home.png
            adb pull /sdcard/screenshot_home.png screenshot_home.png

            # Scroll down and take another screenshot
            adb shell input swipe 500 1000 500 500
            sleep 2
            adb shell screencap -p /sdcard/screenshot_scroll.png
            adb pull /sdcard/screenshot_scroll.png screenshot_scroll.png

            echo "✅ Screenshots captured successfully!"

      - name: Upload Screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-screenshots
          path: screenshot_*.png
