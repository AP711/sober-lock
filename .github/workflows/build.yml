name: Build Sober Lock APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle 8.4
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.4"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Unit Tests
        run: ./gradlew test --no-daemon

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon
        env:
          ADMOB_APP_ID: ${{ secrets.ADMOB_APP_ID }}

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "33.0.1"

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: sober-lock-release
          path: app/build/outputs/apk/release/*.apk

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Write test script
        run: |
          cat > run_tests.sh << 'SCRIPT'
          #!/bin/bash
          set -e

          echo "=== Waiting for emulator ==="
          adb wait-for-device
          adb shell input keyevent 82
          sleep 5

          echo "=== Installing APK ==="
          adb install -r app/build/outputs/apk/debug/app-debug.apk

          echo "=== Screenshot: launcher ==="
          adb shell screencap -p /sdcard/00_launcher.png
          adb pull /sdcard/00_launcher.png 00_launcher.png

          echo "=== Launching app ==="
          adb shell monkey -p com.ap711.soberlock -c android.intent.category.LAUNCHER 1
          sleep 6

          echo "=== Screenshot: home screen ==="
          adb shell screencap -p /sdcard/01_home.png
          adb pull /sdcard/01_home.png 01_home.png

          echo "=== Crash check ==="
          FOCUSED=$(adb shell dumpsys window windows | grep -E 'mCurrentFocus|mFocusedApp' | head -2)
          echo "Focused window: $FOCUSED"
          echo "$FOCUSED" | grep -q "com.ap711.soberlock" && echo "PASS: App is running!" || (echo "FAIL: App crashed!"; adb logcat -d -t 50 | grep -E "AndroidRuntime|FATAL|soberlock" || true; exit 1)

          echo "=== Test: tap interaction ==="
          adb shell input tap 540 960
          sleep 2
          adb shell screencap -p /sdcard/02_after_tap.png
          adb pull /sdcard/02_after_tap.png 02_after_tap.png

          echo "=== Test: back button ==="
          adb shell input keyevent KEYCODE_BACK
          sleep 2
          adb shell screencap -p /sdcard/03_after_back.png
          adb pull /sdcard/03_after_back.png 03_after_back.png

          echo "=== Test: relaunch ==="
          adb shell monkey -p com.ap711.soberlock -c android.intent.category.LAUNCHER 1
          sleep 4
          adb shell screencap -p /sdcard/04_relaunch.png
          adb pull /sdcard/04_relaunch.png 04_relaunch.png

          echo "=== Test: landscape ==="
          adb shell settings put system accelerometer_rotation 0
          adb shell settings put system user_rotation 1
          sleep 3
          adb shell screencap -p /sdcard/05_landscape.png
          adb pull /sdcard/05_landscape.png 05_landscape.png

          echo "=== Test: portrait ==="
          adb shell settings put system user_rotation 0
          sleep 2
          adb shell screencap -p /sdcard/06_portrait.png
          adb pull /sdcard/06_portrait.png 06_portrait.png

          echo "=== Saving logcat ==="
          adb logcat -d | grep -E "soberlock|System.err" | tail -30 > logcat_summary.txt || true

          echo "=== All tests passed! ==="
          SCRIPT
          chmod +x run_tests.sh

      - name: Run Emulator Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86_64
          profile: Nexus 6
          script: bash run_tests.sh

      - name: Upload Screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: functional-test-screenshots
          path: |
            *.png
            logcat_summary.txt
